<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Looping videoklipp · Faktisk Studio</title>
<link rel="stylesheet" href="shared/style.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="studio">

  <header class="topbar">
    <div class="faktisk-logo" role="img" aria-label="Faktisk Studio"></div>
    <span class="topbar__version" id="appVersion" title="Versjoner"></span>
    <div class="topbar__title" role="img" aria-label="Labrador"></div>
    <div class="topbar__actions">
      <button class="btn-primary" id="backBtn">Malside</button>
      <button class="btn-icon" id="fullscreenBtn" title="Fullskjerm" aria-label="Fullskjerm">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
          <path d="M5 5h5v2H7v3H5V5zm9 0h5v5h-2V7h-3V5zM5 14h2v3h3v2H5v-5zm12 0h2v5h-5v-2h3v-3z"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="plugin-page">

    <aside class="plugin-sidebar">
      <h2 class="plugin-sidebar__title">Looping videoklipp</h2>

      <p class="plugin-sidebar__desc">
        Trekk i slideren for å velge klipp, opp til 10 sekunder.
        Trykk så <em>Kopier embed-kode</em> eller <em>Eksporter video</em>
        for å hente ut resultatet.
      </p>

      <div class="url-section">
        <div class="url-section__header">
          <label class="url-section__label" for="videoUrl">Lenke til video</label>
          <button id="openLabradorBtn" class="link-btn" type="button"
                  title="Åpne Labrador File upload i nettleseren for å laste opp video og hente URL">
            Åpne Labrador ↗
          </button>
        </div>
        <div class="url-row">
          <input type="text" id="videoUrl" class="url-row__input"
                 placeholder="https://faktisk.no/uploads/…"
                 spellcheck="false" autocomplete="off">
          <button id="loadVideoBtn" class="btn-tiny">Hent video</button>
        </div>
      </div>

      <div class="plugin-sidebar__status" id="status"></div>

      <div class="caption-section">
        <label class="url-section__label" for="captionText">Bildetekst (valgfri)</label>
        <textarea id="captionText" class="caption-input" rows="2"
                  placeholder="Kort beskrivelse av klippet…"
                  spellcheck="true"></textarea>

        <label class="url-section__label" for="photographerText" style="margin-top: 4px;">Fotograf / kilde (valgfri)</label>
        <input type="text" id="photographerText" class="caption-input caption-input--single"
               placeholder="Navn Navnesen / Reuters / …"
               spellcheck="false" autocomplete="off">
      </div>

      <div class="plugin-sidebar__spacer"></div>

      <div class="project-row">
        <select id="projectSelect" class="project-select">
          <option value="">Velg lagret prosjekt…</option>
        </select>
        <button id="saveProjectBtn" class="btn-tiny" title="Lagre dette oppsettet som et navngitt prosjekt">Lagre…</button>
      </div>

      <div class="export-row">
        <button id="copyEmbedBtn" class="btn-primary export-row__btn" disabled>
          Kopier embed
        </button>
        <button id="exportVideoBtn" class="btn-secondary export-row__btn" disabled>
          Eksporter video
        </button>
      </div>
    </aside>

    <section class="plugin-canvas">
      <div class="canvas-area" id="canvasArea">
        <video id="videoEl" class="canvas-video" muted loop playsinline></video>
        <div class="canvas-empty" id="canvasEmpty">
          <p>Lim inn URL til en video som er lastet opp i Labrador (File upload), og trykk «Hent video».</p>
        </div>
      </div>

      <div class="timeline" id="timeline">
        <div class="timeline__track" id="track">
          <div class="timeline__selection" id="selection"></div>
          <div class="timeline__handle timeline__handle--start" id="handleStart"></div>
          <div class="timeline__handle timeline__handle--end" id="handleEnd"></div>
        </div>
        <div class="timeline__labels">
          <span id="labelStart">0,0s</span>
          <span id="labelDuration">0,0s</span>
          <span id="labelEnd">0,0s</span>
        </div>
      </div>
    </section>

  </main>

</div>

<script src="shared/dialog.js"></script>
<script src="main.js"></script>
</body>
</html>
