<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Før og etter · Faktisk Studio</title>
<link rel="stylesheet" href="shared/style.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="studio">

  <header class="topbar">
    <div class="faktisk-logo" role="img" aria-label="Faktisk Studio"></div>
    <span class="topbar__version" id="appVersion" title="Versjoner"></span>
    <div class="topbar__title" role="img" aria-label="Labrador"></div>
    <div class="topbar__actions">
      <button class="btn-primary" id="backBtn">Malside</button>
      <button class="btn-icon" id="fullscreenBtn" title="Fullskjerm" aria-label="Fullskjerm">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
          <path d="M5 5h5v2H7v3H5V5zm9 0h5v5h-2V7h-3V5zM5 14h2v3h3v2H5v-5zm12 0h2v5h-5v-2h3v-3z"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="plugin-page">

    <aside class="plugin-sidebar">
      <h2 class="plugin-sidebar__title">Før og etter slider</h2>

      <p class="plugin-sidebar__desc">
        Lim inn URL til to bilder som er lastet opp i Labrador. Brukere kan dra
        slideren for å sammenligne før og etter.
      </p>

      <div class="url-section">
        <div class="url-section__header">
          <label class="url-section__label" for="urlBefore">Før-bilde</label>
          <button id="openLabradorBtn" class="link-btn" type="button">
            Åpne Labrador ↗
          </button>
        </div>
        <div class="url-row">
          <input type="text" id="urlBefore" class="url-row__input"
                 placeholder="https://faktisk.no/uploads/…"
                 spellcheck="false" autocomplete="off">
        </div>
      </div>

      <div class="url-section">
        <label class="url-section__label" for="urlAfter">Etter-bilde</label>
        <div class="url-row">
          <input type="text" id="urlAfter" class="url-row__input"
                 placeholder="https://faktisk.no/uploads/…"
                 spellcheck="false" autocomplete="off">
        </div>
      </div>

      <button id="loadBtn" class="btn-tiny">Hent bilder</button>

      <div class="plugin-sidebar__status" id="status"></div>

      <div class="tb-section" id="tbSection" style="display:none;">
        <div class="tb-section__header">
          <span class="url-section__label">Tekstbokser</span>
          <button id="addTbBtn" class="btn-tiny" type="button" style="height:28px;padding:0 10px;font-size:12px;">+ Legg til</button>
        </div>
        <div id="tbList"></div>
      </div>

      <div class="caption-section">
        <label class="url-section__label" for="captionText">Bildetekst (valgfri)</label>
        <textarea id="captionText" class="caption-input" rows="2"
                  placeholder="Kort beskrivelse av sammenligningen…"
                  spellcheck="true"></textarea>

        <label class="url-section__label" for="photographerText" style="margin-top: 4px;">Fotograf / kilde (valgfri)</label>
        <input type="text" id="photographerText" class="caption-input caption-input--single"
               placeholder="Foto: Navn / Etter: Reuters"
               spellcheck="false" autocomplete="off">
      </div>

      <div class="plugin-sidebar__spacer"></div>

      <div class="project-row">
        <select id="projectSelect" class="project-select">
          <option value="">Velg lagret prosjekt…</option>
        </select>
        <button id="saveProjectBtn" class="btn-tiny">Lagre…</button>
      </div>

      <button id="copyEmbedBtn" class="btn-primary" disabled>
        Kopier embed
      </button>
    </aside>

    <section class="plugin-canvas">
      <div class="slider-stage" id="stage">
        <div class="slider-empty" id="emptyState">
          <p>Lim inn URL-er til to bilder lastet opp i Labrador (under 100 MB hver), og trykk «Hent bilder».</p>
        </div>
        <div class="slider-preview" id="preview" style="display:none;">
          <img id="imgAfter" class="slider-img" alt="">
          <div class="slider-clip" id="clip">
            <img id="imgBefore" class="slider-img" alt="">
          </div>
          <div class="slider-handle" id="handle">
            <div class="slider-handle__line"></div>
            <div class="slider-handle__knob">
              <svg viewBox="0 0 229.48 102.71" aria-hidden="true">
                <path fill="#0050fc" d="M225.98,45.29L149.18.95c-4.67-2.69-10.5.67-10.5,6.06v88.69c0,5.39,5.83,8.76,10.5,6.06l76.8-44.34c4.67-2.69,4.67-9.43,0-12.12Z"/>
                <path fill="#0050fc" d="M3.5,45.29L80.3.95c4.67-2.69,10.5.67,10.5,6.06v88.69c0,5.39-5.83,8.76-10.5,6.06L3.5,57.42c-4.67-2.69-4.67-9.43,0-12.12Z"/>
              </svg>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

</div>

<script src="shared/dialog.js"></script>
<script src="main.js"></script>
</body>
</html>
